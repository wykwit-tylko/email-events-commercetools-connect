deployAs:
  - name: event-proxy
    applicationType: event
    endpoint: /event-proxy
    scripts:
      postDeploy: npm install && npm run build && npm run connector:post-deploy
      preUndeploy: npm install && npm run build && npm run connector:pre-undeploy
    configuration:
      standardConfiguration:
        - key: CT_SUBSCRIPTION_KEY
          description: Key of the commercetools Subscription managed by this Connector
          required: false
          default: email-events-proxy
        - key: CT_MESSAGE_RESOURCE_TYPES
          description: Comma-separated list of Message resource types to subscribe to
          required: false
          default: approval-flow,approval-rule,associate-role,business-unit,category,customer,customer-email-token,customer-group,customer-password-token,inventory-entry,order,payment,product,product-selection,product-tailoring,quote,quote-request,review,shopping-list,staged-quote,standalone-price,store
        - key: CT_MESSAGE_TYPES
          description: Optional comma-separated allowlist of Message types to forward. Empty forwards all Message types.
          required: false
        - key: MAX_BODY_BYTES
          description: Maximum accepted Commerce Notification request body size in bytes
          required: false
          default: "90000"
        - key: FORWARDING_TIMEOUT_MS
          description: Timeout for forwarding a Commerce Notification
          required: false
          default: "2000"
        - key: DRY_RUN_FORWARDING
          description: Receive and inspect Commerce Notifications without forwarding to Cloudflare Queue
          required: false
          default: "false"
        - key: DEV_INSPECTION_ENABLED
          description: Enable development-only in-memory inspection endpoints
          required: false
          default: "false"
        - key: DEV_INSPECTION_MAX_MESSAGES
          description: Maximum number of Commerce Notifications kept in the development inspection log
          required: false
          default: "100"
      securedConfiguration:
        - key: OUTBOUND_PUBLISHER_CONFIG
          description: JSON configuration for the selected Commerce Notification publisher adapter
          required: true

inheritAs:
  apiClient:
    scopes:
      - manage_subscriptions
